name: Build SSStart
on:
  push:
    branches: [ main, v2-dev ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build APK
        run: |
          gradle --version
          gradle assembleDebug --no-daemon --stacktrace
      
      - name: Copiar APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/SSStart-${{ github.ref_name }}.apk
      
      - name: Commit APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: APK ${{ github.ref_name }} [skip ci]"
          file_pattern: release/*.apk
