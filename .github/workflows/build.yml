name: Build SSStart
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
      - name: Build APK
        run: gradle assembleRelease --no-daemon
      - name: Copy APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/SSStart-v1.0.apk
      - name: Commit APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: adiciona APK v1.0"
          file_pattern: release/*.apk
