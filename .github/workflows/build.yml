name: Build SSStart
on:
  push:
    branches: [ main, v2-dev ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Build com Gradle 8.7 (sem wrapper)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.7
          arguments: assembleDebug
      
      - name: Copiar APK para /release
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/SSStart-${{ github.ref_name }}.apk
          ls -lh release/
      
      - name: Commit APK no repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: APK ${{ github.ref_name }} [skip ci]"
          file_pattern: release/*.apk
