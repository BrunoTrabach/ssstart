name: Build SSStart

on:
  push:
    branches: [ main, v2-dev ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK 34
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Copiar APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/SSStart-v2-dev.apk

      - name: Instala rclone
        run: sudo apt-get update && sudo apt-get install -y rclone jq

      - name: Configura rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Sobe APK pro Drive
        run: rclone copy release/SSStart-v2-dev.apk gdrive-synapseshade:SSStart-TV-Updates/v2-dev/ -P

      - name: Atualiza version.json
        run: |
          rclone copy gdrive-synapseshade:SSStart-TV-Updates/v2-dev/version.json . || echo '{"versionCode":0}' > version.json
          CODE=$(jq .versionCode version.json)
          NEW=$((CODE+1))
          jq --argjson n $NEW '.versionCode=$n | .versionName="2.0-dev.\($n)" | .apkUrl="https://drive.google.com/uc?export=download&id=1cxPmw28BQqLbvJl7nagnO0DaVhiny3ox" | .changelog="Auto build \($n) - '"$(date +%d/%m/%Y)"'"' version.json > v.json
          mv v.json version.json
          cat version.json
          rclone copy version.json gdrive-synapseshade:SSStart-TV-Updates/v2-dev/

      - name: Commit APK (sem skip)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: APK v2-dev build ${{ github.run_number }}"
          file_pattern: release/*.apk
