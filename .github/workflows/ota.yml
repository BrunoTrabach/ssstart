name: OTA v2-dev

on:
  push:
    branches: [ v2-dev ]
    paths:
      - 'release/*.apk'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instala rclone e jq
        run: sudo apt-get update && sudo apt-get install -y rclone jq

      - name: Configura rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          rclone ls gdrive-synapseshade:SSStart-TV-Updates/v2-dev/ || true

      - name: Sobe APK
        run: |
          rclone copy release/ gdrive-synapseshade:SSStart-TV-Updates/v2-dev/ -P --update

      - name: Atualiza version.json
        run: |
          # baixa o atual (se não existir, cria base)
          rclone copy gdrive-synapseshade:SSStart-TV-Updates/v2-dev/version.json . || echo '{}' > version.json
          
          CURRENT=$(jq -r '.versionCode // 2' version.json)
          NEW=$((CURRENT + 1))
          
          jq --argjson code "$NEW" \
             '.versionCode = $code |
              .versionName = "2.0-dev.\($code)" |
              .apkUrl = "https://drive.google.com/uc?export=download&id=1cxPmw28BQqLbvJl7nagnO0DaVhiny3ox" |
              .changelog = "Auto build \($code) - '"$(date +%d/%m/%Y)"'"' \
             version.json > version.tmp
          
          mv version.tmp version.json
          cat version.json
          
          rclone copy version.json gdrive-synapseshade:SSStart-TV-Updates/v2-dev/ -P
